syntax = "proto3";
package monolythium.burn.v1;

import "amino/amino.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "monolythium/burn/v1/params.proto";

option go_package = "github.com/monolythium/mono-chain/x/burn/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/monolythium/mono-chain/burn/v1/params";
  }

  // BurnStats returns global burn counters/totals.
  rpc BurnStats(QueryBurnStatsRequest) returns (QueryBurnStatsResponse) {
    option (google.api.http).get = "/monolythium/mono-chain/burn/v1/stats";
  }

  // AccountBurns returns the total burned by a single account.
  rpc AccountBurns(QueryAccountBurnsRequest) returns (QueryAccountBurnsResponse) {
    option (google.api.http).get = "/monolythium/mono-chain/burn/v1/accounts/{address}/burns";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

message QueryBurnStatsRequest {}

message QueryBurnStatsResponse {
  uint64 total_burns = 1;
  string total_burned = 2;
}

message QueryAccountBurnsRequest {
  string address = 1;
}

message QueryAccountBurnsResponse {
  string amount = 1;
}
