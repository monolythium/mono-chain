syntax = "proto3";
package monochain.burn.module.v1;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "github.com/monolythium/mono-chain/x/burn/types";

// Module is the config object for the module.
message Module {
  option (cosmos.app.v1alpha1.module) = {go_import: "github.com/monolythium/mono-chain/x/burn"};

  // authority defines the custom module authority.
  // If not set, defaults to the governance module.
  string authority = 1;
}
