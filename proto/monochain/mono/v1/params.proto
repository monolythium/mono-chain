syntax = "proto3";
package monochain.mono.v1;

import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "cosmos/base/v1beta1/coin.proto";

option go_package = "github.com/monolythium/mono-chain/x/mono/types";

message Params {
  option (amino.name)      = "monochain/x/mono/Params";
  option (gogoproto.equal) = true;

  string fee_burn_percent = 1 [
    (cosmos_proto.scalar)  = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable)   = false
  ];

  cosmos.base.v1beta1.Coin validator_registration_burn = 2 [(gogoproto.nullable) = false];

  cosmos.base.v1beta1.Coin validator_min_self_delegation = 3 [(gogoproto.nullable) = false];
}
