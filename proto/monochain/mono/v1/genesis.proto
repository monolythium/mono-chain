syntax = "proto3";
package monochain.mono.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "monochain/mono/v1/params.proto";

option go_package = "github.com/monolythium/mono-chain/x/mono/types";

// GenesisState defines the mono module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}
